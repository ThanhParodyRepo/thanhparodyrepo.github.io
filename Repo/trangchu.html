<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Kho Jailbreak</title>
    <style>
        /* Reset và biến cơ bản */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Giao diện sáng (mặc định) */
            --bg-primary: #f4f6f9;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --text-primary: #1a1a2e;
            --text-secondary: #4a4a6a;
            --text-muted: #6c6c8a;
            --border-color: #e0e4e8;
            --accent-color: #6c5ce7;
            --accent-hover: #5a4bd1;
            --badge-bg: #e8e5ff;
            --badge-text: #6c5ce7;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.1);
            --toggle-bg: #e0e4e8;
            --toggle-thumb: #ffffff;
            --code-bg: #f0f0f5;
            --transition-speed: 0.3s;
        }

        /* Giao diện tối */
        [data-theme="dark"] {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-card: #1a1a2e;
            --text-primary: #e8e8f0;
            --text-secondary: #b0b0c0;
            --text-muted: #8888a0;
            --border-color: #2a2a40;
            --accent-color: #a29bfe;
            --accent-hover: #b9b3ff;
            --badge-bg: #2a2a40;
            --badge-text: #a29bfe;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
            --toggle-bg: #3a3a50;
            --toggle-thumb: #1a1a2e;
            --code-bg: #2a2a40;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            transition: background-color var(--transition-speed), color var(--transition-speed);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Thanh tiêu đề */
        .header {
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-sm);
            transition: background-color var(--transition-speed), border-color var(--transition-speed);
        }

        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: -0.5px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent-color), #a29bfe);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
        }

        /* Bộ chuyển đổi giao diện */
        .theme-toggle-wrapper {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .theme-label {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-secondary);
            user-select: none;
        }

        .theme-toggle {
            position: relative;
            width: 60px;
            height: 30px;
            background-color: var(--toggle-bg);
            border-radius: 30px;
            cursor: pointer;
            border: 2px solid var(--border-color);
            transition: background-color var(--transition-speed), border-color var(--transition-speed);
            display: inline-block;
        }

        .theme-toggle::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 22px;
            height: 22px;
            background-color: var(--toggle-thumb);
            border-radius: 50%;
            transition: transform var(--transition-speed), background-color var(--transition-speed);
            box-shadow: 0 1px 4px rgba(0,0,0,0.2);
        }

        /* Checkbox ẩn */
        #theme-checkbox {
            display: none;
        }

        #theme-checkbox:checked + .theme-toggle::after {
            transform: translateX(28px);
        }

        /* Biểu tượng bên trong nút chuyển */
        .toggle-icon {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.8rem;
            pointer-events: none;
            z-index: 1;
        }

        .toggle-icon.sun {
            left: 7px;
        }

        .toggle-icon.moon {
            right: 7px;
        }

        /* Nội dung chính */
        .main-content {
            flex: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            width: 100%;
        }

        /* Tiêu đề trang */
        .page-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .page-subtitle {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        /* Lưới gói */
        .packages-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .package-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: var(--shadow-md);
            transition: transform 0.2s, box-shadow 0.2s, background-color var(--transition-speed), border-color var(--transition-speed);
            cursor: pointer;
        }

        .package-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .package-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
        }

        .package-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent-color), #a29bfe);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.3rem;
            flex-shrink: 0;
        }

        .package-name {
            font-weight: 600;
            font-size: 1.2rem;
            color: var(--text-primary);
        }

        .package-version {
            font-size: 0.85rem;
            color: var(--text-muted);
            background-color: var(--badge-bg);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-weight: 500;
        }

        .package-description {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 1rem;
            line-height: 1.5;
        }

        .package-meta {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            flex-wrap: wrap;
        }

        .package-badge {
            background-color: var(--badge-bg);
            color: var(--badge-text);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-weight: 500;
            font-size: 0.8rem;
        }

        /* Mã nguồn hiển thị */
        .code-block {
            background-color: var(--code-bg);
            border-radius: 12px;
            padding: 1rem;
            margin-top: 1rem;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 0.9rem;
            overflow-x: auto;
            white-space: pre-wrap;
            border: 1px solid var(--border-color);
        }

        /* Footer */
        .footer {
            background-color: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            padding: 1.5rem 2rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            transition: background-color var(--transition-speed), border-color var(--transition-speed);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-inner {
                flex-direction: column;
                align-items: flex-start;
            }

            .packages-grid {
                grid-template-columns: 1fr;
            }

            .main-content {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Thanh tiêu đề -->
    <header class="header">
        <div class="header-inner">
            <a href="#" class="logo">
                <div class="logo-icon">⚡</div>
                <span>Kho Jailbreak</span>
            </a>

            <!-- Bộ chuyển đổi Sáng/Tối -->
            <div class="theme-toggle-wrapper">
                <span class="theme-label">🌞 Sáng</span>
                <input type="checkbox" id="theme-checkbox" onchange="toggleTheme()">
                <label for="theme-checkbox" class="theme-toggle" aria-label="Chuyển đổi giao diện sáng/tối">
                    <span class="toggle-icon sun">☀️</span>
                    <span class="toggle-icon moon">🌙</span>
                </label>
                <span class="theme-label">🌙 Tối</span>
            </div>
        </div>
    </header>

    <!-- Nội dung chính -->
    <main class="main-content">
        <h1 class="page-title">📦 Gói Jailbreak</h1>
        <p class="page-subtitle">Bộ sưu tập các gói jailbreak mới nhất dành cho thiết bị của bạn. Chọn một gói để xem chi tiết.</p>

        <div class="packages-grid" id="packages-container">
            <!-- Gói được tạo động bằng JavaScript -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p>© 2025 Kho Jailbreak. Tất cả các gói được cung cấp chỉ nhằm mục đích giáo dục và nghiên cứu.</p>
    </footer>

    <script>
        // Dữ liệu gói mẫu
        const packages = [
            {
                id: 'jb-001',
                name: 'Unc0ver',
                version: '8.0.2',
                description: 'Công cụ jailbreak bán tethered cho iOS 11.0 - 14.8. Hỗ trợ Cydia và Substrate.',
                icon: '🔓',
                badge: 'Phổ biến',
                date: '2024-12-01'
            },
            {
                id: 'jb-002',
                name: 'Taurine',
                version: '1.1.7',
                description: 'Jailbreak cho iOS 14.0 - 14.3 sử dụng libhooker. Nhẹ và ổn định.',
                icon: '🐂',
                badge: 'Mới',
                date: '2025-01-15'
            },
            {
                id: 'jb-003',
                name: 'Dopamine',
                version: '2.0.5',
                description: 'Jailbreak rootless cho iOS 15.0 - 16.6.1. Hỗ trợ Sileo và Zebra.',
                icon: '🧠',
                badge: 'Khuyên dùng',
                date: '2025-02-20'
            },
            {
                id: 'jb-004',
                name: 'palera1n',
                version: '2.1.3',
                description: 'Jailbreak checkm8 cho thiết bị A8-A11. Hỗ trợ iOS 15.x - 17.x.',
                icon: '🍏',
                badge: 'Tethered',
                date: '2025-03-10'
            },
            {
                id: 'jb-005',
                name: 'XinaA15',
                version: '1.2.0',
                description: 'Jailbreak cho thiết bị A12-A15 chạy iOS 15.0 - 15.4.1. Hỗ trợ rootful.',
                icon: '🇨🇳',
                badge: 'Thử nghiệm',
                date: '2025-04-05'
            },
            {
                id: 'jb-006',
                name: 'Bootstrap',
                version: '1.0.0',
                description: 'Môi trường bootstrap cho iOS 17.0+. Tiền đề cho jailbreak đầy đủ.',
                icon: '🚀',
                badge: 'Beta',
                date: '2025-05-01'
            }
        ];

        // Hàm hiển thị gói
        function renderPackages() {
            const container = document.getElementById('packages-container');
            container.innerHTML = packages.map(pkg => `
                <div class="package-card" onclick="alert('Đã chọn gói: ${pkg.name} v${pkg.version}\\n${pkg.description}')">
                    <div class="package-header">
                        <div class="package-icon">${pkg.icon}</div>
                        <div>
                            <div class="package-name">${pkg.name}</div>
                            <span class="package-version">v${pkg.version}</span>
                        </div>
                    </div>
                    <p class="package-description">${pkg.description}</p>
                    <div class="package-meta">
                        <span class="package-badge">${pkg.badge}</span>
                        <span>📅 ${pkg.date}</span>
                    </div>
                </div>
            `).join('');
        }

        // Hàm chuyển đổi giao diện
        function toggleTheme() {
            const checkbox = document.getElementById('theme-checkbox');
            const html = document.documentElement;
            
            if (checkbox.checked) {
                html.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
            } else {
                html.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
            }
        }

        // Hàm tải giao diện đã lưu
        function loadTheme() {
            const savedTheme = localStorage.getItem('theme');
            const checkbox = document.getElementById('theme-checkbox');
            
            if (savedTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                checkbox.checked = true;
            } else {
                document.documentElement.removeAttribute('data-theme');
                checkbox.checked = false;
            }
        }

        // Khởi tạo trang
        function init() {
            loadTheme();
            renderPackages();
        }

        // Chạy khi trang tải xong
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
