<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BVN Repo</title>
    <style>
        :root {
            --bg: #f5f5f7;
            --card: #ffffff;
            --text: #1d1d1f;
            --muted: #86868b;
            --accent: #0071e3;
            --border: #d2d2d7;
            --sep: #e5e5ea;
            --header-bg: rgba(255,255,255,0.88);
            --badge-bg: #e8f0fe;
            --badge-text: #0071e3;
            --icon-bg: #f2f2f7;
        }

        [data-theme="dark"] {
            --bg: #1c1c1e;
            --card: #2c2c2e;
            --text: #f5f5f7;
            --muted: #98989d;
            --accent: #2997ff;
            --border: #48484a;
            --sep: #38383a;
            --header-bg: rgba(28,28,30,0.92);
            --badge-bg: #1c3a5c;
            --badge-text: #2997ff;
            --icon-bg: #3a3a3c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            transition: background 0.3s, color 0.3s;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* HEADER mờ như repo gốc */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            background: var(--header-bg);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid var(--sep);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .repo-logo {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: linear-gradient(145deg, #0071e3, #5ac8fa);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            font-size: 18px;
            box-shadow: 0 2px 8px rgba(0,113,227,0.3);
        }

        .repo-info h1 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.2px;
        }

        .repo-info span {
            font-size: 12px;
            color: var(--muted);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Nút thêm repo */
        .add-repo-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        .add-repo-btn:active { opacity: 0.7; transform: scale(0.95); }

        /* Nút chuyển theme */
        .theme-icon-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            color: var(--text);
        }
        .theme-icon-btn:hover { background: var(--icon-bg); }

        /* PHẦN NỘI DUNG CHÍNH - TRANG CHỦ REPO */
        .main-content {
            text-align: center;
            padding: 40px 20px;
            max-width: 500px;
            margin-top: 60px;
        }

        .welcome-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .welcome-title {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.3px;
            margin-bottom: 8px;
        }

        .welcome-sub {
            font-size: 16px;
            color: var(--muted);
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .repo-url-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 20px;
            font-size: 16px;
            font-family: 'SF Mono', 'Menlo', monospace;
            color: var(--accent);
            display: inline-block;
            margin-bottom: 20px;
            word-break: break-all;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 12px 28px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary:active { opacity: 0.7; transform: scale(0.95); }

        .btn-secondary {
            background: var(--card);
            color: var(--accent);
            border: 1px solid var(--border);
            padding: 12px 28px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-secondary:active { opacity: 0.7; transform: scale(0.95); }

        /* FOOTER */
        .footer {
            position: fixed;
            bottom: 20px;
            text-align: center;
            color: var(--muted);
            font-size: 13px;
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <div class="header-left">
            <div class="repo-logo">B</div>
            <div class="repo-info">
                <h1>BVN Repo</h1>
                <span>repo.bvnrepo.xyz</span>
            </div>
        </div>
        <div class="header-actions">
            <button class="theme-icon-btn" id="themeBtn">🌙</button>
        </div>
    </header>

    <!-- NỘI DUNG CHÍNH -->
    <main class="main-content">
        <div class="welcome-icon">📦</div>
        <h2 class="welcome-title">Chào mừng đến với BVN Repo</h2>
        <p class="welcome-sub">Kho lưu trữ gói jailbreak chất lượng cao.<br>Thêm repo này vào trình quản lý gói của bạn để cài đặt.</p>
        
        <div class="repo-url-box">https://repo.bvnrepo.xyz</div>
        
        <div class="action-buttons">
            <button class="btn-primary" onclick="copyRepo()">📋 Sao chép URL</button>
            <button class="btn-secondary" onclick="alert('Mở Cydia/Sileo → Sources → Edit → Add → Dán URL')">📖 Hướng dẫn</button>
        </div>
    </main>

    <!-- FOOTER -->
    <div class="footer">
        <p>© 2025 BVN Repo — Tất cả gói miễn phí</p>
    </div>

    <script>
        function copyRepo() {
            navigator.clipboard.writeText('https://repo.bvnrepo.xyz').then(() => {
                alert('✅ Đã sao chép URL repo!');
            }).catch(() => {
                prompt('Sao chép thủ công:', 'https://repo.bvnrepo.xyz');
            });
        }

        // Chuyển theme
        const btn = document.getElementById('themeBtn');
        function setTheme(t) {
            if (t === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                btn.textContent = '☀️';
                localStorage.setItem('bvn-theme', 'dark');
            } else {
                document.documentElement.removeAttribute('data-theme');
                btn.textContent = '🌙';
                localStorage.setItem('bvn-theme', 'light');
            }
        }

        btn.addEventListener('click', () => {
            const cur = document.documentElement.getAttribute('data-theme');
            setTheme(cur === 'dark' ? 'light' : 'dark');
        });

        if (localStorage.getItem('bvn-theme') === 'dark') setTheme('dark');
        else setTheme('light');
    </script>
</body>
</html>
