<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MrPew iOS Repo</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #1c1c1e;
            --card-bg: #f9f9fb;
            --border: #e5e5ea;
            --accent: #007aff;
            --accent-light: #e8f2ff;
            --muted: #8e8e93;
            --header-bg: #ffffff;
            --shadow: 0 2px 8px rgba(0,0,0,0.04);
            --toggle-bg: #e9e9ef;
            --toggle-dot: #ffffff;
        }

        [data-theme="dark"] {
            --bg: #1c1c1e;
            --text: #f2f2f7;
            --card-bg: #2c2c2e;
            --border: #38383a;
            --accent: #0a84ff;
            --accent-light: #1a3a5c;
            --muted: #98989d;
            --header-bg: #2c2c2e;
            --shadow: 0 2px 8px rgba(0,0,0,0.3);
            --toggle-bg: #48484a;
            --toggle-dot: #1c1c1e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: all 0.3s ease;
            min-height: 100vh;
        }

        /* HEADER giống Cydia/Sileo */
        .repo-header {
            background: var(--header-bg);
            border-bottom: 1px solid var(--border);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: var(--shadow);
        }

        .repo-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .repo-avatar {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: linear-gradient(135deg, #007aff, #5856d6);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 18px;
        }

        .repo-name {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .repo-url {
            font-size: 13px;
            color: var(--muted);
        }

        /* NÚT CHUYỂN SÁNG/TỐI NHƯ TRONG REPO GỐC */
        .theme-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.2s;
            color: var(--text);
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-btn:hover {
            background: var(--card-bg);
        }

        .theme-btn:active {
            transform: scale(0.92);
        }

        /* PHẦN CHÍNH */
        .main {
            max-width: 700px;
            margin: 0 auto;
            padding: 20px 16px;
        }

        /* Ô TÌM KIẾM */
        .search-box {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 16px;
            width: 100%;
            color: var(--text);
            outline: none;
            transition: all 0.2s;
            margin-bottom: 20px;
        }

        .search-box:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        .search-box::placeholder {
            color: var(--muted);
        }

        /* DANH SÁCH GÓI */
        .package-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .package-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px 18px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all 0.2s;
            cursor: pointer;
            text-decoration: none;
            color: var(--text);
        }

        .package-item:hover {
            box-shadow: var(--shadow);
            transform: translateY(-1px);
        }

        .package-item:active {
            transform: scale(0.985);
            background: var(--accent-light);
        }

        .pkg-icon {
            width: 50px;
            height: 50px;
            border-radius: 14px;
            background: var(--accent-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .pkg-info {
            flex: 1;
            min-width: 0;
        }

        .pkg-name {
            font-weight: 600;
            font-size: 17px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .pkg-desc {
            font-size: 14px;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }

        .pkg-arrow {
            color: var(--muted);
            font-size: 18px;
            flex-shrink: 0;
        }

        /* FOOTER */
        .repo-footer {
            text-align: center;
            padding: 30px 20px;
            color: var(--muted);
            font-size: 13px;
            border-top: 1px solid var(--border);
            margin-top: 30px;
        }

        .repo-footer a {
            color: var(--accent);
            text-decoration: none;
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header class="repo-header">
        <div class="repo-brand">
            <div class="repo-avatar">M</div>
            <div>
                <div class="repo-name">MrPew</div>
                <div class="repo-url">mrpewios.github.io</div>
            </div>
        </div>
        <button class="theme-btn" id="themeToggle" title="Chuyển sáng/tối">
            <span id="themeIcon">🌙</span>
        </button>
    </header>

    <!-- NỘI DUNG CHÍNH -->
    <main class="main">
        <input type="text" class="search-box" placeholder="Tìm kiếm gói..." id="searchInput">

        <div class="package-list" id="packageList">
            <!-- Gói sẽ được tạo bằng JS -->
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="repo-footer">
        <p>© 2025 <a href="https://mrpewios.github.io" target="_blank">MrPew Repo</a>. Tất cả gói đều miễn phí.</p>
        <p style="margin-top: 4px;">Thêm vào Cydia/Sileo: <code style="background:var(--card-bg);padding:2px 6px;border-radius:4px;">https://mrpewios.github.io</code></p>
    </footer>

    <script>
        // DỮ LIỆU GÓI - GIỐNG REPO GỐC
        const packages = [
            { name: "Choicy", desc: "Tinh chỉnh kiểm soát tweak injection", icon: "🎛️" },
            { name: "SnowBoard", desc: "Công cụ thay đổi theme mạnh mẽ", icon: "❄️" },
            { name: "iCleaner Pro", desc: "Dọn dẹp rác hệ thống iOS", icon: "🧹" },
            { name: "Filza File Manager", desc: "Trình quản lý file cho iOS", icon: "📁" },
            { name: "AppSync Unified", desc: "Cài đặt ứng dụng IPA không cần ký", icon: "📱" },
            { name: "NewTerm 2", desc: "Terminal cho iOS", icon: "💻" },
            { name: "CCSupport", desc: "Hỗ trợ tùy chỉnh Control Center", icon: "🎮" },
            { name: "RocketBootstrap", desc: "Thư viện cho tweak giao tiếp app", icon: "🚀" },
            { name: "PreferenceLoader", desc: "Tải preference bundle", icon: "⚙️" },
            { name: "Cephei", desc: "Framework hỗ trợ lập trình tweak", icon: "🔧" },
            { name: "libcolorpicker", desc: "Thư viện bảng chọn màu", icon: "🎨" },
            { name: "Flipswitch", desc: "Công tắc bật/tắt cho Control Center", icon: "🔘" }
        ];

        // Hàm render danh sách gói
        function renderPackages(filter = '') {
            const list = document.getElementById('packageList');
            const filtered = packages.filter(p => 
                p.name.toLowerCase().includes(filter.toLowerCase()) ||
                p.desc.toLowerCase().includes(filter.toLowerCase())
            );

            list.innerHTML = filtered.map(pkg => `
                <a href="#" class="package-item" onclick="alert('📦 ${pkg.name}\\n${pkg.desc}\\n\\nRepo: https://mrpewios.github.io')">
                    <div class="pkg-icon">${pkg.icon}</div>
                    <div class="pkg-info">
                        <div class="pkg-name">${pkg.name}</div>
                        <div class="pkg-desc">${pkg.desc}</div>
                    </div>
                    <span class="pkg-arrow">›</span>
                </a>
            `).join('');
        }

        // TÌM KIẾM
        document.getElementById('searchInput').addEventListener('input', function(e) {
            renderPackages(e.target.value);
        });

        // CHUYỂN SÁNG/TỐI
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');

        function setTheme(theme) {
            if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeIcon.textContent = '☀️';
                localStorage.setItem('mrpew-theme', 'dark');
            } else {
                document.documentElement.removeAttribute('data-theme');
                themeIcon.textContent = '🌙';
                localStorage.setItem('mrpew-theme', 'light');
            }
        }

        themeToggle.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            setTheme(current === 'dark' ? 'light' : 'dark');
        });

        // TẢI THEME ĐÃ LƯU
        const saved = localStorage.getItem('mrpew-theme');
        if (saved === 'dark') {
            setTheme('dark');
        } else {
            setTheme('light');
        }

        // KHỞI TẠO
        renderPackages();
    </script>

</body>
</html>
